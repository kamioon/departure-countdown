; PlatformIO Project Configuration File
; Run `pio test -e native` to execute unit tests on the desktop
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_src_filter = +<*> -<*_stub.cpp> -<*_native.cpp>

; Partition scheme for larger apps with web UI
board_build.partitions = huge_app.csv

; USB CDC for Serial (ESP32-S3 native USB support)
board_build.arduino.memory_type = qio_opi
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Library dependencies
lib_deps =
    ; Display Libraries - MAX7219 LED Matrix
    majicdesigns/MD_MAX72XX@^3.5.1
    majicdesigns/MD_Parola@^3.7.3

    ; Input Libraries
    mathertel/RotaryEncoder@^1.5.3

    ; WiFi & Web Server
    esphome/ESPAsyncWebServer-esphome@^3.0.0
    esphome/AsyncTCP-esphome@^2.0.1

    ; HTTP Client & JSON
    bblanchon/ArduinoJson@^7.0.0

    ; RTC Support
    adafruit/RTClib@^2.1.1

; Test environment
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<*> -<main.cpp> -<*_esp32.cpp>
extra_scripts = scripts/fix_native_ar.py   ; use Apple ar — GNU ar (Homebrew) makes archives Apple ld rejects
build_flags =
    -std=c++11
    -I ${PROJECT_DIR}/arduino_native
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
